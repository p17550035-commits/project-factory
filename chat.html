<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Groq Command Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root { color-scheme: dark; }

    body {
      background:#050509;
      color:#eee;
      font-family:sans-serif;
      margin:0;
      padding:0;
      display:flex;
      flex-direction:column;
      height:100dvh;
      max-width:100vw;
      overflow:hidden;
    }

    #app {
      width:100%;
      max-width:600px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      height:100%;
    }

    /* ---------------- HEADER ---------------- */

    #header {
      padding:6px 10px;
      background:#0b0b12;
      border-bottom:1px solid #222;
      font-size:14px;
      font-weight:600;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      position:relative;
    }

    .header-center {
      flex:0;
      white-space:nowrap;
      text-align:left;
    }

    .header-right {
      position:absolute;
      right:10px;
      display:flex;
      gap:6px;
      align-items:center;
    }

    #dropdownToggle {
      background:#111827;
      color:#e5e7eb;
      border:none;
      padding:4px 8px;
      border-radius:999px;
      cursor:pointer;
      font-size:11px;
    }

    #dropdownMenu {
      position:absolute;
      top:32px;
      right:10px;
      background:#0f172a;
      border:1px solid #222;
      border-radius:8px;
      padding:6px 0;
      display:none;
      flex-direction:column;
      width:150px;
      z-index:20;
    }

    .dropdown-item {
      padding:6px 12px;
      font-size:12px;
      color:#e5e7eb;
      cursor:pointer;
    }

    .dropdown-item:hover {
      background:#1e293b;
    }

    /* ---------------- CHAT AREA ---------------- */

    #chat {
      flex:1;
      overflow-y:auto;
      padding:8px;
      box-sizing:border-box;
      width:100%;
      max-width:100%;
      overscroll-behavior:contain;
    }

    .msg-row {
      display:flex;
      margin:3px 0;
      max-width:100%;
    }

    .msg-row.you { justify-content:flex-end; }
    .msg-row.ai { justify-content:flex-start; }

    .bubble {
      max-width:clamp(70%, 85%, 95%);
      padding:6px 8px;
      border-radius:14px;
      font-size:13px;
      line-height:1.4;
      word-break:break-word;
      position:relative;
    }

    .you .bubble {
      background:#2563eb;
      color:#fff;
      border-bottom-right-radius:4px;
    }

    .ai .bubble {
      background:#1f2937;
      color:#e5e7eb;
      border-bottom-left-radius:4px;
    }

    .timestamp {
      font-size:10px;
      color:#9ca3af;
      margin-top:2px;
      text-align:right;
    }

    .ai .bubble .msg-actions {
      position:absolute;
      top:4px;
      right:6px;
      display:flex;
      gap:4px;
      font-size:10px;
    }

    .msg-btn {
      border:none;
      border-radius:999px;
      padding:2px 6px;
      background:#374151;
      color:#e5e7eb;
      cursor:pointer;
      font-size:10px;
    }

    /* ---------------- INPUT BOX ---------------- */

    #inputBox {
      display:flex;
      padding:6px;
      background:#050509;
      box-sizing:border-box;
      width:100%;
      max-width:100%;
      border-top:1px solid #222;
      gap:6px;
      flex-shrink:0;
    }

    #text {
      flex:1;
      padding:8px;
      border-radius:999px;
      border:none;
      font-size:14px;
      max-width:100%;
      outline:none;
      background:#111827;
      color:#e5e7eb;
    }

    #send {
      padding:8px 14px;
      border:none;
      border-radius:999px;
      background:#4ade80;
      color:#022c22;
      font-size:14px;
      font-weight:600;
      flex-shrink:0;
    }

    /* ---------------- CODE BLOCKS ---------------- */

    pre {
      background:#020617;
      padding:6px;
      border-radius:10px;
      overflow-x:auto;
      overflow-y:auto;
      max-height:40vh;
      font-size:12px;
      white-space:pre-wrap;
      word-break:break-word;
      position:relative;
      margin-top:4px;
      box-shadow:inset 0 -8px 8px -8px rgba(0,0,0,0.7);
    }

    pre.expanded {
      max-height:80vh;
      box-shadow:none;
    }

    code {
      font-family:monospace;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .copy-btn {
      position:absolute;
      top:4px;
      right:6px;
      background:#374151;
      color:#e5e7eb;
      border:none;
      padding:2px 6px;
      border-radius:999px;
      cursor:pointer;
      font-size:10px;
    }

    .expand-hint {
      position:absolute;
      bottom:4px;
      right:6px;
      font-size:10px;
      color:#9ca3af;
    }

  </style>
</head>

<body>

<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="header-center">Groq Command Console</div>

    <div class="header-right">
      <button id="dropdownToggle">Menu</button>

      <div id="dropdownMenu">
        <div class="dropdown-item" id="clearChat">Clear Chat</div>
        <div class="dropdown-item" id="testSystem">Test System</div>
        <div class="dropdown-item" id="restartSystem">Restart System</div>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat"></div>

  <!-- INPUT -->
  <div id="inputBox">
    <input id="text" placeholder="Type command or request...">
    <button id="send">Send</button>
  </div>

</div>

<script>
  const chat = document.getElementById("chat");
  const text = document.getElementById("text");
  const send = document.getElementById("send");

  const dropdownToggle = document.getElementById("dropdownToggle");
  const dropdownMenu = document.getElementById("dropdownMenu");

  const clearChatBtn = document.getElementById("clearChat");
  const testSystemBtn = document.getElementById("testSystem");
  const restartSystemBtn = document.getElementById("restartSystem");

  /* ---------------- TIMESTAMP ---------------- */

  function getTimestamp() {
    const d = new Date();
    let h = d.getHours();
    const m = d.getMinutes().toString().padStart(2, "0");
    const ampm = h >= 12 ? "PM" : "AM";
    h = h % 12 || 12;
    return `${h}:${m} ${ampm}`;
  }

  /* ---------------- MESSAGE HANDLING ---------------- */

  function convertMarkdown(md) {
    return md.replace(/```([\s\S]*?)```/g, (match, code) => {
      return `<pre><code>${code.replace(/</g, "&lt;")}</code></pre>`;
    });
  }

  function addMessage(content, isUser) {
    const row = document.createElement("div");
    row.className = "msg-row " + (isUser ? "you" : "ai");

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = convertMarkdown(content);

    const time = document.createElement("div");
    time.className = "timestamp";
    time.textContent = getTimestamp();

    bubble.appendChild(time);

    if (!isUser) {
      const actions = document.createElement("div");
      actions.className = "msg-actions";

      const copyMsgBtn = document.createElement("button");
      copyMsgBtn.className = "msg-btn";
      copyMsgBtn.textContent = "Copy msg";
      copyMsgBtn.onclick = () => {
        navigator.clipboard.writeText(bubble.innerText);
        copyMsgBtn.textContent = "Copied!";
        setTimeout(() => copyMsgBtn.textContent = "Copy msg", 1500);
      };

      actions.appendChild(copyMsgBtn);
      bubble.appendChild(actions);
    }

    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;

    enhanceCodeBlocks();
  }

  function enhanceCodeBlocks() {
    document.querySelectorAll(".bubble pre").forEach(block => {
      if (!block.dataset.init) {
        block.dataset.init = "true";

        const btn = document.createElement("button");
        btn.textContent = "Copy";
        btn.className = "copy-btn";
        btn.onclick = () => {
          navigator.clipboard.writeText(block.innerText);
          btn.textContent = "Copied!";
