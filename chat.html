<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Groq Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root { color-scheme: dark; }

    body {
      background:#050509;
      color:#eee;
      font-family:sans-serif;
      margin:0;
      padding:0;
      display:flex;
      flex-direction:column;
      height:100dvh;
      max-width:100vw;
      overflow:hidden;
    }

    #app {
      width:100%;
      max-width:600px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      height:100%;
    }

    /* ---------------- HEADER ---------------- */

    #header {
      padding:6px 10px;
      background:#0b0b12;
      border-bottom:1px solid #222;
      font-size:14px;
      font-weight:600;
      flex-shrink:0;
      display:flex;
      align-items:center;
      justify-content:flex-start; /* shifted left */
      position:relative;
    }

    .header-center {
      flex:0; /* no longer stretching to center */
      text-align:left;
    }

    .header-right {
      position:absolute;
      right:10px;
      display:flex;
      gap:6px;
    }

    #modeToggle, #copyConversation {
      font-size:11px;
      padding:4px 8px;
      border-radius:999px;
      border:none;
      background:#111827;
      color:#e5e7eb;
      cursor:pointer;
    }

    /* ---------------- CHAT AREA ---------------- */

    #chat {
      flex:1;
      overflow-y:auto;
      padding:8px;
      box-sizing:border-box;
      width:100%;
      max-width:100%;
      overscroll-behavior:contain;
    }

    .msg-row {
      display:flex;
      margin:3px 0;
      max-width:100%;
    }

    .msg-row.you { justify-content:flex-end; }
    .msg-row.ai { justify-content:flex-start; }

    .bubble {
      max-width:clamp(70%, 85%, 95%);
      padding:6px 8px;
      border-radius:14px;
      font-size:13px;
      line-height:1.4;
      word-break:break-word;
      position:relative;
    }

    .you .bubble {
      background:#2563eb;
      color:#fff;
      border-bottom-right-radius:4px;
    }

    .ai .bubble {
      background:#1f2937;
      color:#e5e7eb;
      border-bottom-left-radius:4px;
    }

    .ai .bubble .msg-actions {
      position:absolute;
      top:4px;
      right:6px;
      display:flex;
      gap:4px;
      font-size:10px;
    }

    .msg-btn {
      border:none;
      border-radius:999px;
      padding:2px 6px;
      background:#374151;
      color:#e5e7eb;
      cursor:pointer;
      font-size:10px;
    }

    /* ---------------- INPUT BOX ---------------- */

    #inputBox {
      display:flex;
      padding:6px;
      background:#050509;
      box-sizing:border-box;
      width:100%;
      max-width:100%;
      border-top:1px solid #222;
      gap:6px;
      flex-shrink:0;
    }

    #text {
      flex:1;
      padding:8px;
      border-radius:999px;
      border:none;
      font-size:14px;
      max-width:100%;
      outline:none;
      background:#111827;
      color:#e5e7eb;
    }

    #send {
      padding:8px 14px;
      border:none;
      border-radius:999px;
      background:#4ade80;
      color:#022c22;
      font-size:14px;
      font-weight:600;
      flex-shrink:0;
    }

    /* ---------------- CODE BLOCKS ---------------- */

    pre {
      background:#020617;
      padding:6px;
      border-radius:10px;
      overflow-x:auto;
      overflow-y:auto;
      max-height:40vh;
      font-size:12px;
      white-space:pre-wrap;
      word-break:break-word;
      position:relative;
      margin-top:4px;
      box-shadow:inset 0 -8px 8px -8px rgba(0,0,0,0.7);
    }

    pre.expanded {
      max-height:80vh;
      box-shadow:none;
    }

    code {
      font-family:monospace;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .copy-btn {
      position:absolute;
      top:4px;
      right:6px;
      background:#374151;
      color:#e5e7eb;
      border:none;
      padding:2px 6px;
      border-radius:999px;
      cursor:pointer;
      font-size:10px;
    }

    .expand-hint {
      position:absolute;
      bottom:4px;
      right:6px;
      font-size:10px;
      color:#9ca3af;
    }

    /* ---------------- COMPACT MODE ---------------- */

    body.compact .bubble {
      padding:4px 6px;
      font-size:12px;
    }

    body.compact pre {
      padding:4px;
      font-size:11px;
      max-height:35vh;
    }

    body.compact code {
      font-size:11px;
    }

    body.compact #header {
      padding:4px 8px;
      font-size:13px;
    }

    body.compact #inputBox {
      padding:4px;
    }

    body.compact #text {
      padding:6px;
      font-size:13px;
    }

    body.compact #send {
      padding:6px 12px;
      font-size:13px;
    }
  </style>
</head>

<body>

<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="header-center">Groq App Builder Chat</div>

    <div class="header-right">
      <button id="copyConversation">Copy</button>
      <button id="modeToggle">Compact</button>
    </div>
  </div>
