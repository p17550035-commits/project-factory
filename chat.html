<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Groq Chat</title>
  <style>
    body { background:#111; color:#eee; font-family:sans-serif; margin:0; padding:0; }
    #chat { height:80vh; overflow-y:auto; padding:10px; border-bottom:1px solid #444; }
    .msg { margin:8px 0; }
    .you { color:#7cf; }
    .ai { color:#9f9; }
    #inputBox { display:flex; padding:10px; }
    #text { flex:1; padding:10px; border-radius:6px; border:none; }
    #send { padding:10px 20px; margin-left:10px; border:none; border-radius:6px; background:#4a8; color:#fff; }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="text" placeholder="Type here...">
  <button id="send">Send</button>
</div>

<script>
  const chat = document.getElementById("chat");
  const text = document.getElementById("text");
  const send = document.getElementById("send");

  function addMessage(content, isUser) {
    const div = document.createElement("div");
    div.className = "msg " + (isUser ? "you" : "ai");
    div.textContent = (isUser ? "You: " : "AI: ") + content;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  async function sendMessage() {
    const msg = text.value.trim();
    if (!msg) return;
    text.value = "";

    addMessage(msg, true);

    const res = await fetch("/project/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: msg, project_type: "chat" })
    });

    const data = await res.json();
    const reply = data.generated_code || JSON.stringify(data);

    addMessage(reply, false);
  }

  send.onclick = sendMessage;
  text.onkeydown = (e) => { if (e.key === "Enter") sendMessage(); };
</script>

</body>
</html>
