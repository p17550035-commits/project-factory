<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Groq Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background:#111;
      color:#eee;
      font-family:sans-serif;
      margin:0;
      padding:0;
      display:flex;
      flex-direction:column;
      height:100vh;
      overflow:hidden;
    }

    #chat {
      flex:1;
      overflow-y:auto;
      padding:12px;
      box-sizing:border-box;
      width:100%;
      max-width:100%;
    }

    .msg {
      margin:10px 0;
      white-space:pre-wrap;
      word-wrap:break-word;
    }

    .you { color:#7cf; }
    .ai { color:#9f9; }

    #inputBox {
      display:flex;
      padding:10px;
      background:#000;
      box-sizing:border-box;
      width:100%;
    }

    #text {
      flex:1;
      padding:10px;
      border-radius:6px;
      border:none;
      font-size:16px;
    }

    #send {
      padding:10px 20px;
      margin-left:10px;
      border:none;
      border-radius:6px;
      background:#4a8;
      color:#fff;
      font-size:16px;
    }

    pre {
      background:#222;
      padding:10px;
      border-radius:6px;
      overflow-x:auto;
      position:relative;
    }

    .copy-btn {
      position:absolute;
      top:6px;
      right:6px;
      background:#444;
      color:#fff;
      border:none;
      padding:4px 8px;
      border-radius:4px;
      cursor:pointer;
      font-size:12px;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputBox">
  <input id="text" placeholder="Type here...">
  <button id="send">Send</button>
</div>

<script>
  const chat = document.getElementById("chat");
  const text = document.getElementById("text");
  const send = document.getElementById("send");

  // Convert Markdown code blocks to <pre><code>
  function convertMarkdown(md) {
    return md.replace(/```([\s\S]*?)```/g, (match, code) => {
      return `<pre><code>${code.replace(/</g, "&lt;")}</code></pre>`;
    });
  }

  function addMessage(content, isUser) {
    const div = document.createElement("div");
    div.className = "msg " + (isUser ? "you" : "ai");
    div.innerHTML = convertMarkdown(content);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function addCopyButtons() {
    document.querySelectorAll("pre").forEach(block => {
      if (block.dataset.hasCopy) return;
      block.dataset.hasCopy = "true";

      const btn = document.createElement("button");
      btn.textContent = "Copy";
      btn.className = "copy-btn";

      btn.onclick = () => {
        navigator.clipboard.writeText(block.innerText);
        btn.textContent = "Copied!";
        setTimeout(() => btn.textContent = "Copy", 1500);
      };

      block.appendChild(btn);
    });
  }

  async function sendMessage() {
    const msg = text.value.trim();
    if (!msg) return;
    text.value = "";

    addMessage("You: " + msg, true);

    const res = await fetch("/project/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: msg, project_type: "chat" })
    });

    const data = await res.json();
    const reply = data.generated_code || JSON.stringify(data);

    addMessage(reply, false);
    addCopyButtons();
  }

  send.onclick = sendMessage;
  text.onkeydown = (e) => { if (e.key === "Enter") sendMessage(); };
</script>

</body>
</html>
