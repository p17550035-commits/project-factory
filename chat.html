<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Groq Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      color-scheme: dark;
    }

    body {
      background:#050509;
      color:#eee;
      font-family:sans-serif;
      margin:0;
      padding:0;
      display:flex;
      flex-direction:column;
      height:100dvh;
      max-width:100vw;
      overflow:hidden;
    }

    #header {
      padding:10px 14px;
      background:#0b0b12;
      border-bottom:1px solid #222;
      font-size:16px;
      font-weight:600;
      flex-shrink:0;
    }

    #chat {
      flex:1;
      overflow-y:auto;
      padding:10px;
      box-sizing:border-box;
      width:100%;
      max-width:100vw;
      overscroll-behavior:contain;
    }

    .msg-row {
      display:flex;
      margin:6px 0;
      max-width:100%;
    }

    .msg-row.you { justify-content:flex-end; }
    .msg-row.ai { justify-content:flex-start; }

    .bubble {
      max-width:80%;
      padding:8px 10px;
      border-radius:14px;
      font-size:14px;
      line-height:1.4;
      word-break:break-word;
      position:relative;
    }

    .you .bubble {
      background:#2563eb;
      color:#fff;
      border-bottom-right-radius:4px;
    }

    .ai .bubble {
      background:#1f2937;
      color:#e5e7eb;
      border-bottom-left-radius:4px;
    }

    #inputBox {
      display:flex;
      padding:8px;
      background:#050509;
      box-sizing:border-box;
      width:100%;
      max-width:100vw;
      border-top:1px solid #222;
      gap:8px;
      flex-shrink:0;
    }

    #text {
      flex:1;
      padding:10px;
      border-radius:999px;
      border:none;
      font-size:15px;
      max-width:100%;
      outline:none;
      background:#111827;
      color:#e5e7eb;
    }

    #send {
      padding:10px 16px;
      border:none;
      border-radius:999px;
      background:#4ade80;
      color:#022c22;
      font-size:15px;
      font-weight:600;
      flex-shrink:0;
    }

    pre {
      background:#020617;
      padding:8px;
      border-radius:10px;
      overflow-x:auto;
      margin-top:6px;
      font-size:13px;
      max-width:100%;
      position:relative;
    }

    code {
      font-family:monospace;
      white-space:pre;
    }

    .copy-btn {
      position:absolute;
      top:6px;
      right:8px;
      background:#374151;
      color:#e5e7eb;
      border:none;
      padding:3px 8px;
      border-radius:999px;
      cursor:pointer;
      font-size:11px;
    }
  </style>
</head>

<body>

<div id="header">Groq App Builder Chat</div>

<div id="chat"></div>

<div id="inputBox">
  <input id="text" placeholder="Type here...">
  <button id="send">Send</button>
</div>

<script>
  const chat = document.getElementById("chat");
  const text = document.getElementById("text");
  const send = document.getElementById("send");

  function convertMarkdown(md) {
    return md.replace(/```([\s\S]*?)```/g, (match, code) => {
      return `<pre><code>${code.replace(/</g, "&lt;")}</code></pre>`;
    });
  }

  function addMessage(content, isUser) {
    const row = document.createElement("div");
    row.className = "msg-row " + (isUser ? "you" : "ai");

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = convertMarkdown(content);

    row.appendChild(bubble);
    chat.appendChild(row);
    chat.scrollTop = chat.scrollHeight;

    addCopyButtons();
  }

  function addCopyButtons() {
    document.querySelectorAll(".bubble pre").forEach(block => {
      if (block.dataset.hasCopy) return;
      block.dataset.hasCopy = "true";

      const btn = document.createElement("button");
      btn.textContent = "Copy";
      btn.className = "copy-btn";

      btn.onclick = () => {
        navigator.clipboard.writeText(block.innerText);
        btn.textContent = "Copied!";
        setTimeout(() => btn.textContent = "Copy", 1500);
      };

      block.appendChild(btn);
    });
  }

  async function sendMessage() {
    const msg = text.value.trim();
    if (!msg) return;
    text.value = "";

    addMessage(msg, true);

    const res = await fetch("/project/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: msg, project_type: "chat" })
    });

    const data = await res.json();
    const reply = data.generated_code || JSON.stringify(data);

    addMessage(reply, false);
  }

  send.onclick = sendMessage;
  text.onkeydown = (e) => { if (e.key === "Enter") sendMessage(); };
</script>

</body>
</html>
